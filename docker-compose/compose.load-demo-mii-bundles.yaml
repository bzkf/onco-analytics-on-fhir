services:
  data-loader:
    image: docker.io/confluentinc/cp-kcat:8.2.0@sha256:202244a9b32c9d19d0721eb80ff3a4abfe1a23b188f8eee5c50c779fb4c9d4af
    ipc: none
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    privileged: false
    restart: on-failure
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        for f in /data/demo-mii-bundles/*.json; do
          echo "$$f"
          tr -d '\n' < "$$f" | kcat -b kafka:9092 -t fhir.obds.bundles -P -k "$$f" -c 1
        done
    volumes:
      - ../tests/fixtures/fhir/:/data/demo-mii-bundles/:ro
    depends_on:
      wait-for-kafka:
        condition: service_completed_successfully

  wait-for-kafka:
    image: ghcr.io/wait4x/wait4x:3.6.0@sha256:bec7ac18547781d854562c3729d3195c3880116d6758c49fdf4573ad58805f14
    ipc: none
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    privileged: false
    restart: "no"
    command:
      - kafka
      - kafka://kafka:9092
      - --timeout
      - 30s
    depends_on:
      kafka:
        condition: service_started
