services:
  blaze:
    image: ${IMAGE_REGISTRY_GHCR_IO:-ghcr.io}/samply/blaze:1.6.2@sha256:4148d6cc9daf1f7237270878535d176b1e24b8d4092dcf636d42778c3a49dbc8
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx16g"
      BASE_URL: "http://blaze:8080"
    volumes:
      - "blaze-data:/app/data"
    ports:
      - "127.0.0.1:8083:8080"

  fhir-to-server:
    image: ${IMAGE_REGISTRY_GHCR_IO:-ghcr.io}/miracum/kafka-fhir-to-server:v3.0.16@sha256:16b62b14f0e1b518d086313238e764ca0eb8f76ad78e5ea2f7579d7b646db7e1
    restart: unless-stopped
    cap_drop:
      - ALL
    privileged: false
    ipc: none
    security_opt:
      - "no-new-privileges:true"
    environment:
      SECURITY_PROTOCOL: PLAINTEXT
      BOOTSTRAP_SERVERS: kafka:9092
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75"
      FHIR_URL: ${FHIR_URL:-http://blaze:8080/fhir}
      FHIR_AUTH_BASIC_ENABLED: "${FHIR_AUTH_BASIC_ENABLED:-false}"
      FHIR_AUTH_BASIC_USERNAME: "${FHIR_AUTH_BASIC_USERNAME}"
      FHIR_AUTH_BASIC_PASSWORD: "${FHIR_AUTH_BASIC_PASSWORD}"
      TOPIC: ${TOPIC:-fhir.obds.MedicationStatement,fhir.obds.Condition,fhir.obds.Observation,fhir.obds.Procedure,fhir.obds.Patient}

volumes:
  blaze-data: {}
