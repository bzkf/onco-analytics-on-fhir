name: ci

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  release:
    types:
      - created
  merge_group:
    types:
      - checks_requested

permissions:
  contents: read

env:
  ONCO_ANALYTICS_NAMESPACE_NAME: bzkf-onco-analytics

jobs:
  build-analytics-on-fhir-image:
    name: build analytics-on-fhir container image
    uses: miracum/.github/.github/workflows/standard-build.yaml@6dd82c72c638213b8b8dac2e93fc71e06a7bf349 # v1.22.3
    permissions:
      contents: write
      id-token: write
      packages: write
      pull-requests: write
      actions: read
      security-events: write
      attestations: write
    with:
      image: ghcr.io/${{ github.repository }}/analytics-on-fhir
      build-context: .
      enable-build-test-layer: false
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}

  test-analytics-on-fhir:
    name: run analytics-on-fhir tests
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: install graphviz
        run: |
          sudo apt install -y graphviz

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: ${{ github.event_name != 'pull_request' }}
          activate-environment: true
          working-directory: .

      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: "temurin"
          java-version-file: ".java-version"

      - name: Install test dependencies
        run: |
          uv sync --locked --all-extras --dev

      - name: Run tests
        run: |
          uv run pytest -vv --log-cli-level=20 --cov=analytics_on_fhir --cov-report=html --capture=no

      - name: Upload test coverage
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: analytics-on-fhir-test-coverage
          path: htmlcov/

  test-compose:
    name: run compose e2e tests
    runs-on: ubuntu-24.04
    needs:
      - build-analytics-on-fhir-image
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit # change to 'egress-policy: block' after couple of runs

      # <https://docs.docker.com/storage/containerd/>
      # via <https://github.com/docker/setup-buildx-action/issues/257>
      - name: Set up containerd image store
        shell: bash
        run: |
          [ -f /etc/docker/daemon.json ] || echo "{}" | sudo tee /etc/docker/daemon.json
          jq '. | .+{"features": {"containerd-snapshotter": true}}' /etc/docker/daemon.json > /tmp/docker-daemon-with-containerd.json
          sudo mv /tmp/docker-daemon-with-containerd.json /etc/docker/daemon.json
          cat /etc/docker/daemon.json
          sudo systemctl restart docker
          docker info -f '{{ .DriverStatus }}'

      - name: Free disk space
        uses: endersonmenezes/free-disk-space@7901478139cff6e9d44df5972fd8ab8fcade4db1 # v3.2.2
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          rm_cmd: "rmz"

      - name: Download image
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.build-analytics-on-fhir-image.outputs.image-slug }}
          path: /tmp

      - name: Load image
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          docker load --input /tmp/image.tar
          docker image ls

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: start Kafka & Kafka Connect
        working-directory: docker-compose/
        run: |
          docker compose -f compose.kafka.yaml up -d

      - name: load the fhir resources in Kafka
        working-directory: docker-compose/
        run: |
          docker compose -f compose.kafka.yaml -f compose.load-demo-mii-bundles.yaml up data-loader --attach-dependencies --abort-on-container-failure

      - name: de-identify the resources
        working-directory: docker-compose/
        run: |
          docker compose --env-file=.demo.env -f compose.pseudonymization.yaml up -d
          # not a great idea.
          sleep 120

      - name: load the resources into Delta Lake tables
        working-directory: docker-compose/
        run: |
          docker compose --project-name=docker-compose --env-file=.demo.env -f compose.fhir-to-delta.yaml -f trino-pathling/compose.yaml --project-directory trino-pathling/ up -d

      - name: Wait for Trino query to return results
        run: |
          MAX_RETRIES=30
          SLEEP=10

          curl -LSs -o trino-cli.jar https://github.com/trinodb/trino/releases/download/479/trino-cli-479

          for i in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $i/$MAX_RETRIES"

            OUTPUT=$(java -jar trino-cli.jar --execute "SELECT count(*) FROM fhir.default.AdverseEvent" 2>&1) && SUCCESS=true || SUCCESS=false

            echo "$OUTPUT"

            if [ "$SUCCESS" = true ] && [[ "$OUTPUT" =~ [0-9]+ ]]; then
              echo "Query succeeded with result."
              break
            fi

            if [ "$i" -eq "$MAX_RETRIES" ]; then
              echo "Query failed after $MAX_RETRIES attempts"
              exit 1
            fi

            echo "Retrying in $SLEEP seconds..."
            sleep $SLEEP
          done

      - name: query them using trino
        run: |
          java -jar trino-cli.jar --debug --execute 'SELECT * FROM fhir.default.Patient'
          java -jar trino-cli.jar --debug --execute 'SELECT * FROM fhir.default.Observation'
          java -jar trino-cli.jar --debug --execute 'SELECT * FROM fhir.default.Condition'
          java -jar trino-cli.jar --debug --execute 'SELECT * FROM fhir.default.AdverseEvent'

      - name: Run dq study
        working-directory: docker-compose/
        env:
          LOCATION: ci
          STUDY_NAME: "dq"
          ANALYTICS_ON_FHIR_IMAGE_TAG: ${{ needs.build-analytics-on-fhir-image.outputs.image-version }}
        run: |
          sudo chown -R 65532:65532 ./opal-output/
          docker compose --env-file=.demo.env -f compose.analytics-on-fhir.yaml up --exit-code-from=analytics-on-fhir

      - name: upload output
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: opal-df
          path: |
            docker-compose/opal-output/

      - name: Print compose logs
        if: always()
        working-directory: docker-compose/
        run: |
          docker compose --project-name=docker-compose logs | tee compose-logs.txt

      - name: Upload compose dump
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: compose-logs
          path: |
            docker-compose/compose-logs.txt

  lint:
    uses: miracum/.github/.github/workflows/standard-lint.yaml@6dd82c72c638213b8b8dac2e93fc71e06a7bf349 # v1.22.3
    permissions:
      contents: read
      pull-requests: write
      issues: write
      security-events: write
      actions: read
    with:
      enable-validate-gradle-wrapper: false
      codeql-languages: '["python"]'
      enable-codeql: false
      enable-verify-base-image-signature: false
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}

  release:
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    permissions:
      actions: read
      contents: write
      id-token: write
      packages: write
    needs:
      - build-analytics-on-fhir-image
    uses: ./.github/workflows/release.yaml
